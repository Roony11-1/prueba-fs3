services:
  bd:
    image: postgres:15
    environment:
      POSTGRES_DB: ejemplo_db
      POSTGRES_USER: ejemplo_user
      POSTGRES_PASSWORD: ejemplo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejemplo_user -d ejemplo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # (Opcional) Sin espacios después de las comas
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat,cons,envi,mntr"
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Esperando 20 segundos para que Kafka termine de iniciar...'
      sleep 20
      
      echo 'Creando topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ventas --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventario --partitions 1 --replication-factor 1
      
      echo 'Topics creados:'
      kafka-topics --bootstrap-server kafka:9092 --list
      "

  inventoryservice:
    build: ./InventoryService
    depends_on:
      bd:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      Kafka__BootstrapServers: kafka:9092
      POSTGRES_CONNECTION: "Host=bd;Database=ejemplo_db;Username=ejemplo_user;Password=ejemplo_password"
    restart: on-failure

  inventoryapp:
    build: ./my-inventory-app
    depends_on:
      inventoryservice:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data: