services:
  bd:
    image: postgres:15
    environment:
      POSTGRES_DB: ejemplo_db
      POSTGRES_USER: ejemplo_user
      POSTGRES_PASSWORD: ejemplo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejemplo_user -d ejemplo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventoryservice:
    build: ./InventoryService
    depends_on:
      bd:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      Kafka__BootstrapServers: kafka:9092
      POSTGRES_CONNECTION: "Host=bd;Database=ejemplo_db;Username=ejemplo_user;Password=ejemplo_password"
    restart: on-failure

  inventoryapp:
    build: ./my-inventory-app
    depends_on:
      inventoryservice:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data: