services:
  bd:
    image: postgres:15
    environment:
      POSTGRES_DB: ejemplo_db
      POSTGRES_USER: ejemplo_user
      POSTGRES_PASSWORD: ejemplo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejemplo_user -d ejemplo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  inventoryservice:
    build: ./InventoryService
    depends_on:
      bd:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      Kafka__BootstrapServers: kafka:9092
      POSTGRES_CONNECTION: "Host=bd;Database=ejemplo_db;Username=ejemplo_user;Password=ejemplo_password"
    restart: on-failure

  inventoryapp:
    build: ./my-inventory-app
    depends_on:
      inventoryservice:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data: