spring.application.name=demo

# Puerto del servidor
server.port=5000

# Configuración PostgreSQL
spring.datasource.url=jdbc:postgresql://bd_inventory:5432/inventory_db
spring.datasource.username=inventory_user
spring.datasource.password=inventory_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=producto-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.session.timeout.ms=10000
spring.kafka.consumer.properties.heartbeat.interval.ms=3000

# Hikari
# 5 conexiones abiertas minimo
spring.datasource.hikari.minimum-idle=5
# timeout en ms (5 s)
spring.datasource.hikari.connection-timeout=5000
# aca 10 s
spring.datasource.hikari.idle-timeout=10000
# 180 s y mata las conexiones
spring.datasource.hikari.max-lifetime=180000
# maximo de conexiones
spring.datasource.hikari.maximum-pool-size=10

# ProductoRetry
resilience4j.retry.instances.productoRetry.max-attempts=3
resilience4j.retry.instances.productoRetry.wait-duration=250ms
resilience4j.circuitbreaker.instances.productoRetry.slidingWindowSize=6
resilience4j.circuitbreaker.instances.productoRetry.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productoRetry.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.productoRetry.registerHealthIndicator=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-pl1b5b2qt0uh7j45.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://my-api
logging.level.org.springframework.security=TRACE